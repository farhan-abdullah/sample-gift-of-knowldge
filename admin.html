<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — জ্ঞানের উপহার</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=Hind+Siliguri:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g: #1a4d3a; --g2: #2e7d52; --gold: #c9a84c;
      --bg: #f4f6f8; --surface: #ffffff;
      --border: #e5e9ee; --text: #1a2332; --muted: #6b7a8d;
      --red: #e53935; --amber: #f59e0b; --blue: #2563eb; --teal: #0d9488;
      --sidebar: 240px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    input, select, textarea, button { font-family: inherit; font-size: 14px; }
    button { cursor: pointer; }
    a { text-decoration: none; color: inherit; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; overflow: hidden; }
    .sidebar {
      width: var(--sidebar); flex-shrink: 0;
      background: var(--g); color: #fff;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      height: 56px; flex-shrink: 0;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
    }
    .content { flex: 1; overflow-y: auto; padding: 28px; }

    /* ── Sidebar ── */
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .sidebar-logo .org { font-family: 'Hind Siliguri', sans-serif; font-size: 15px; font-weight: 600; color: #fff; }
    .sidebar-logo .sub { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px; }
    .nav-section { padding: 20px 12px 8px; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; margin: 1px 8px; border-radius: 6px;
      font-size: 13px; color: rgba(255,255,255,0.7); cursor: pointer;
      transition: all 0.15s;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,0.14); color: #fff; font-weight: 500; }
    .nav-item .badge {
      margin-left: auto; background: var(--gold); color: #1a2332;
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px;
    }
    .sidebar-footer { margin-top: auto; padding: 16px; border-top: 1px solid rgba(255,255,255,0.1); }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
    .card-sm { padding: 16px 20px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

    /* ── Stat card ── */
    .stat-card { border-radius: 10px; padding: 20px 22px; color: #fff; position: relative; overflow: hidden; }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; opacity: 0.75; margin-top: 6px; letter-spacing: 0.3px; }
    .stat-delta { font-size: 11px; margin-top: 10px; opacity: 0.7; }
    .stat-icon { position: absolute; right: 16px; top: 16px; font-size: 28px; opacity: 0.3; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); padding: 10px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { transition: background 0.12s; }
    tbody tr:hover { background: #f8fafc; }
    tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }

    /* ── Badges ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-approved { background: #d1fae5; color: #065f46; }
    .badge-declined { background: #fee2e2; color: #991b1b; }
    .badge-new { background: #dbeafe; color: #1e40af; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--g); color: #fff; }
    .btn-primary:hover { background: var(--g2); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger { background: #fee2e2; color: var(--red); border: 1px solid #fecaca; }
    .btn-danger:hover { background: #fecaca; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-icon { padding: 6px; border-radius: 6px; background: none; border: 1px solid var(--border); color: var(--muted); }
    .btn-icon:hover { background: var(--bg); color: var(--text); }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 9px 13px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); transition: border-color 0.15s, box-shadow 0.15s; }
    .form-input:focus { outline: none; border-color: var(--g); box-shadow: 0 0 0 3px rgba(26,77,58,0.08); background: #fff; }
    textarea.form-input { resize: vertical; min-height: 90px; }

    /* ── Section header ── */
    .page-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--text); }
    .page-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .section-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 4px; margin-bottom: 20px; }
    .tab { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500; color: var(--muted); border: none; background: none; cursor: pointer; transition: all 0.15s; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    /* ── Chart bar ── */
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .bar-label { width: 80px; font-size: 12px; color: var(--muted); flex-shrink: 0; text-align: right; }
    .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .bar-val { width: 36px; font-size: 12px; font-weight: 600; color: var(--text); }

    /* ── Mini sparkline ── */
    .sparkline { display: flex; align-items: flex-end; gap: 3px; height: 32px; }
    .spark-bar { flex: 1; border-radius: 2px 2px 0 0; min-width: 4px; }

    /* ── Login ── */
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--g); }

    /* ── Responsive ── */
    @media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } :root { --sidebar: 0px; } .sidebar { display: none; } }

    /* ── Transitions ── */
    .fade-in { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Seed data ────────────────────────────────────────────────────────────
    const SEED_REQUESTS = [
      { id: 1, type: 'book', name: 'Rahim Uddin', district: 'Rajshahi', phone: '+8801711234567', bookType: 'Book(s) for myself', books: 'Quran with Bengali translation, Tafsir Ibn Kathir', reason: 'I have been wanting to learn Tafsir for years', heard: 'Facebook', date: '2025-04-20', status: 'pending' },
      { id: 2, type: 'book', name: 'Fatima Khatun', district: 'Dhaka', phone: '+8801811234568', bookType: 'Books for a school / library', books: 'Science books for class 6–8, Bengali literature', reason: 'Our school library has only 12 books for 300 students', heard: 'Mosque', date: '2025-04-19', status: 'approved' },
      { id: 3, type: 'book', name: 'Abdul Karim', district: 'Chittagong', phone: '+8801911234569', bookType: 'Quran copy', books: 'Quran with transliteration', reason: 'My father passed away, I want to recite in his memory', heard: 'Friend / Family', date: '2025-04-18', status: 'approved' },
      { id: 4, type: 'book', name: 'Nasrin Begum', district: 'Khulna', phone: '', bookType: 'Bulk donation for institution', books: 'Islamic books, children\'s Islamic stories', reason: 'Madrasa with 80 students, no library', heard: 'Facebook', date: '2025-04-17', status: 'pending' },
      { id: 5, type: 'book', name: 'Jahangir Alam', district: 'Mymensingh', phone: '+8801611234571', bookType: 'Book(s) for myself', books: 'Self-development, leadership, Islamic finance', reason: 'Want to improve myself and my business ethically', heard: 'Other', date: '2025-04-15', status: 'declined' },
      { id: 6, type: 'book', name: 'Sumaiya Islam', district: 'Sylhet', phone: '+8801711234572', bookType: 'Book(s) for myself', books: 'Seerah of the Prophet, Fiqh basics', reason: 'Recently became more practicing, want to learn', heard: 'Facebook', date: '2025-04-13', status: 'pending' },
      { id: 7, type: 'volunteer', name: 'Tanvir Ahmed', location: 'Dhaka, Bangladesh', skill: 'Ground distribution (Bangladesh)', message: 'I have a motorcycle and free time on weekends. Can deliver books across Dhaka.', date: '2025-04-21', status: 'new' },
      { id: 8, type: 'volunteer', name: 'Sadia Rahman', location: 'Milan, Italy', skill: 'Social media & content', message: 'I manage social media for a Bengali community here. Happy to help create content.', date: '2025-04-18', status: 'approved' },
      { id: 9, type: 'volunteer', name: 'Mizanur Rahman', location: 'Chittagong, Bangladesh', skill: 'Translation (Bengali/English/Arabic)', message: 'I have studied Arabic for 8 years and can translate content.', date: '2025-04-14', status: 'new' },
    ];

    const SEED_CONTENT = {
      stats: { books: 300, districts: 12, families: 180, libraries: 3 },
      mission: {
        heading: 'Knowledge is the greatest sadaqah jariyah',
        body: 'জ্ঞানের উপহার distributes books and Qurans to individuals, schools, and libraries across Bangladesh — free of charge, for the sake of Allah. Founded in Italy, rooted in Bangladesh, driven by love of knowledge.',
      },
      hero: {
        subtitle: 'One book · One mind · One change',
      },
      contact: {
        facebook: 'জ্ঞানের উপহার',
        email: 'info@gyanerupohar.org',
      }
    };

    const MONTHLY = [
      { m: 'Nov', books: 18 }, { m: 'Dec', books: 31 }, { m: 'Jan', books: 24 },
      { m: 'Feb', books: 42 }, { m: 'Mar', books: 58 }, { m: 'Apr', books: 67 },
    ];

    // ── LocalStorage helpers ──────────────────────────────────────────────────
    const ls = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ── Login ─────────────────────────────────────────────────────────────────
    function Login({ onLogin }) {
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      const submit = () => {
        if (pw === 'admin123') { onLogin(); setErr(false); }
        else { setErr(true); setTimeout(() => setErr(false), 1200); }
      };
      return (
        <div className="login-wrap">
          <div style={{ background: '#fff', borderRadius: 12, padding: '40px 44px', width: 360, boxShadow: '0 20px 60px rgba(0,0,0,0.2)' }}>
            <div style={{ textAlign: 'center', marginBottom: 28 }}>
              <div style={{ width: 48, height: 48, background: 'var(--g)', borderRadius: 10, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px', fontSize: 22, fontFamily: 'serif', color: '#fff' }}>ج</div>
              <div style={{ fontFamily: 'Playfair Display, serif', fontSize: 18, fontWeight: 700 }}>Admin Panel</div>
              <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>জ্ঞানের উপহার · Gift of Knowledge</div>
            </div>
            <div className="form-group">
              <label className="form-label">Password</label>
              <input
                type="password" className="form-input" placeholder="Enter password"
                value={pw} onChange={e => setPw(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && submit()}
                style={{ borderColor: err ? 'var(--red)' : undefined }}
                autoFocus
              />
              {err && <div style={{ color: 'var(--red)', fontSize: 12, marginTop: 5 }}>Incorrect password</div>}
            </div>
            <button className="btn btn-primary" style={{ width: '100%', justifyContent: 'center', padding: '10px' }} onClick={submit}>Sign In →</button>
            <div style={{ textAlign: 'center', marginTop: 16, fontSize: 11, color: 'var(--muted)' }}>Demo password: <code style={{ background: '#f3f4f6', padding: '2px 6px', borderRadius: 3 }}>admin123</code></div>
          </div>
        </div>
      );
    }

    // ── Sidebar ───────────────────────────────────────────────────────────────
    const NAV = [
      { id: 'dashboard', icon: '⬛', label: 'Dashboard' },
      { id: 'requests', icon: '📬', label: 'Book Requests', badge: 'req' },
      { id: 'volunteers', icon: '🤝', label: 'Volunteers', badge: 'vol' },
      { id: 'content', icon: '✏️', label: 'Site Content' },
      { id: 'stats', icon: '📊', label: 'Statistics' },
      { id: 'settings', icon: '⚙️', label: 'Settings' },
    ];

    function Sidebar({ page, setPage, pendingReq, pendingVol }) {
      const badges = { req: pendingReq, vol: pendingVol };
      return (
        <div className="sidebar">
          <div className="sidebar-logo">
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ width: 36, height: 36, background: 'var(--gold)', borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontFamily: 'serif', color: 'var(--g)', fontWeight: 700, flexShrink: 0 }}>ج</div>
              <div>
                <div className="org">জ্ঞানের উপহার</div>
                <div className="sub">Admin Panel</div>
              </div>
            </div>
          </div>
          <div className="nav-section">Main</div>
          {NAV.map(n => (
            <div key={n.id} className={`nav-item${page === n.id ? ' active' : ''}`} onClick={() => setPage(n.id)}>
              <span style={{ fontSize: 14 }}>{n.icon}</span>
              <span>{n.label}</span>
              {n.badge && badges[n.badge] > 0 && <span className="badge">{badges[n.badge]}</span>}
            </div>
          ))}
          <div className="sidebar-footer">
            <a href="index.html" target="_blank" style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'rgba(255,255,255,0.5)', fontSize: 12 }}>
              <span>↗</span> View live site
            </a>
          </div>
        </div>
      );
    }

    // ── Dashboard ─────────────────────────────────────────────────────────────
    function Dashboard({ requests, content, setPage }) {
      const bookReqs = requests.filter(r => r.type === 'book');
      const volReqs = requests.filter(r => r.type === 'volunteer');
      const pending = requests.filter(r => r.status === 'pending' || r.status === 'new');
      const approved = requests.filter(r => r.status === 'approved');
      const maxBooks = Math.max(...MONTHLY.map(m => m.books));

      const districtCount = {};
      bookReqs.forEach(r => { districtCount[r.district] = (districtCount[r.district] || 0) + 1; });
      const topDistricts = Object.entries(districtCount).sort((a,b) => b[1]-a[1]).slice(0, 5);

      return (
        <div className="fade-in">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
            <div>
              <div className="page-title">Dashboard</div>
              <div className="page-sub">Overview of জ্ঞানের উপহার operations</div>
            </div>
            <div style={{ fontSize: 12, color: 'var(--muted)', background: '#fff', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 14px' }}>
              📅 April 27, 2026
            </div>
          </div>

          {/* Stat cards */}
          <div className="grid-4" style={{ marginBottom: 20 }}>
            {[
              { label: 'Books Donated', val: content.stats.books, icon: '📖', color: 'linear-gradient(135deg, #1a4d3a, #2e7d52)', delta: '+67 this month' },
              { label: 'Book Requests', val: bookReqs.length, icon: '📬', color: 'linear-gradient(135deg, #1e3a5f, #2563eb)', delta: `${pending.filter(r=>r.type==='book').length} pending review` },
              { label: 'Volunteers', val: volReqs.length, icon: '🤝', color: 'linear-gradient(135deg, #7c3aed, #a855f7)', delta: `${volReqs.filter(r=>r.status==='new').length} new applications` },
              { label: 'Districts Reached', val: content.stats.districts, icon: '🗺️', color: 'linear-gradient(135deg, #c9a84c, #e6b85c)', delta: `${content.stats.families}+ families served` },
            ].map(s => (
              <div key={s.label} className="stat-card" style={{ background: s.color }}>
                <div className="stat-icon">{s.icon}</div>
                <div className="stat-val">{s.val.toLocaleString()}</div>
                <div className="stat-label">{s.label}</div>
                <div className="stat-delta">{s.delta}</div>
              </div>
            ))}
          </div>

          <div className="grid-2" style={{ marginBottom: 20 }}>
            {/* Monthly books chart */}
            <div className="card">
              <div className="section-title">📈 Books Distributed — Last 6 months</div>
              <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, height: 120, marginBottom: 8 }}>
                {MONTHLY.map((m, i) => (
                  <div key={m.m} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                    <div style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 600 }}>{m.books}</div>
                    <div style={{
                      width: '100%', background: i === MONTHLY.length - 1 ? 'var(--g)' : 'rgba(26,77,58,0.2)',
                      borderRadius: '4px 4px 0 0',
                      height: `${(m.books / maxBooks) * 90}px`,
                      transition: 'height 0.5s ease',
                    }} />
                    <div style={{ fontSize: 10, color: 'var(--muted)' }}>{m.m}</div>
                  </div>
                ))}
              </div>
              <div style={{ fontSize: 12, color: 'var(--muted)', textAlign: 'center' }}>Total: {MONTHLY.reduce((a, m) => a + m.books, 0)} books in 6 months</div>
            </div>

            {/* Request status breakdown */}
            <div className="card">
              <div className="section-title">📋 Request Status</div>
              {[
                { label: 'Approved', val: approved.length, color: '#10b981', pct: approved.length / requests.length },
                { label: 'Pending', val: pending.length, color: '#f59e0b', pct: pending.length / requests.length },
                { label: 'Declined', val: requests.filter(r=>r.status==='declined').length, color: '#ef4444', pct: requests.filter(r=>r.status==='declined').length / requests.length },
              ].map(r => (
                <div key={r.label} className="bar-row">
                  <div className="bar-label">{r.label}</div>
                  <div className="bar-track"><div className="bar-fill" style={{ width: `${r.pct * 100}%`, background: r.color }} /></div>
                  <div className="bar-val">{r.val}</div>
                </div>
              ))}
              <div style={{ marginTop: 16 }}>
                <div className="section-title" style={{ fontSize: 13 }}>Top Districts</div>
                {topDistricts.map(([d, c]) => (
                  <div key={d} className="bar-row" style={{ marginBottom: 8 }}>
                    <div className="bar-label" style={{ fontSize: 11 }}>{d}</div>
                    <div className="bar-track"><div className="bar-fill" style={{ width: `${(c / bookReqs.length) * 100}%`, background: 'var(--g)' }} /></div>
                    <div className="bar-val">{c}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Recent requests */}
          <div className="card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <div className="section-title" style={{ margin: 0 }}>🕐 Recent Requests</div>
              <button className="btn btn-ghost btn-sm" onClick={() => setPage('requests')}>View all →</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead><tr>
                  <th>Name</th><th>Type</th><th>District</th><th>Date</th><th>Status</th>
                </tr></thead>
                <tbody>
                  {requests.slice(0, 5).map(r => (
                    <tr key={r.id}>
                      <td style={{ fontWeight: 500 }}>{r.name}</td>
                      <td><span className="badge" style={{ background: r.type === 'book' ? '#dbeafe' : '#ede9fe', color: r.type === 'book' ? '#1e40af' : '#6d28d9' }}>{r.type === 'book' ? '📖 Book' : '🤝 Volunteer'}</span></td>
                      <td style={{ color: 'var(--muted)' }}>{r.district || r.location}</td>
                      <td style={{ color: 'var(--muted)' }}>{r.date}</td>
                      <td><StatusBadge s={r.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ── Status Badge helper ───────────────────────────────────────────────────
    function StatusBadge({ s }) {
      const map = { pending: 'badge-pending', approved: 'badge-approved', declined: 'badge-declined', new: 'badge-new' };
      const labels = { pending: '⏳ Pending', approved: '✓ Approved', declined: '✗ Declined', new: '🔵 New' };
      return <span className={`badge ${map[s] || 'badge-new'}`}>{labels[s] || s}</span>;
    }

    // ── Delivery status meta ──────────────────────────────────────────────────
    const DELIVERY_META = {
      approved:   { label: 'Awaiting Order', icon: '🕐', color: '#6366f1' },
      ordered:    { label: 'Ordered',        icon: '🛒', color: '#2563eb' },
      dispatched: { label: 'In Transit',     icon: '🚚', color: '#f59e0b' },
      delivered:  { label: 'Delivered',      icon: '✅', color: '#10b981' },
    };

    // ── Requests page ─────────────────────────────────────────────────────────
    function RequestsPage({ requests, setRequests, typeFilter }) {
      const [tab, setTab] = useState(typeFilter || 'book');
      const [statusFilter, setStatusFilter] = useState('all');
      const [search, setSearch] = useState('');
      const [selected, setSelected] = useState(null);
      const [deliveries, setDeliveries] = useState(() => ls.get('gk_deliveries', {}));

      // Poll deliveries every 5s so admin sees shop updates in near real-time
      useEffect(() => {
        const t = setInterval(() => setDeliveries(ls.get('gk_deliveries', {})), 5000);
        return () => clearInterval(t);
      }, []);

      const rows = requests
        .filter(r => r.type === tab)
        .filter(r => statusFilter === 'all' || r.status === statusFilter)
        .filter(r => !search || r.name.toLowerCase().includes(search.toLowerCase()) || (r.district || r.location || '').toLowerCase().includes(search.toLowerCase()));

      const updateStatus = (id, status) => {
        setRequests(prev => {
          const next = prev.map(r => r.id === id ? { ...r, status } : r);
          ls.set('gk_requests', next);
          return next;
        });
        if (selected?.id === id) setSelected(s => ({ ...s, status }));
      };

      const getDelivery = (id) => deliveries[id] || null;

      return (
        <div className="fade-in">
          <div style={{ marginBottom: 24 }}>
            <div className="page-title">{tab === 'book' ? '📬 Book Requests' : '🤝 Volunteer Applications'}</div>
            <div className="page-sub">{rows.length} entries · manage and respond to submissions</div>
          </div>

          <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap', alignItems: 'center' }}>
            <div className="tabs" style={{ marginBottom: 0 }}>
              <button className={`tab${tab === 'book' ? ' active' : ''}`} onClick={() => setTab('book')}>Book Requests ({requests.filter(r=>r.type==='book').length})</button>
              <button className={`tab${tab === 'volunteer' ? ' active' : ''}`} onClick={() => setTab('volunteer')}>Volunteers ({requests.filter(r=>r.type==='volunteer').length})</button>
            </div>
            <select className="form-input" style={{ width: 140 }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
              <option value="all">All statuses</option>
              <option value="pending">Pending</option>
              <option value="new">New</option>
              <option value="approved">Approved</option>
              <option value="declined">Declined</option>
            </select>
            <input className="form-input" style={{ width: 200 }} placeholder="Search name / location…" value={search} onChange={e => setSearch(e.target.value)} />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: selected ? '1fr 400px' : '1fr', gap: 20 }}>
            <div className="card" style={{ padding: 0 }}>
              <div className="table-wrap">
                <table>
                  <thead><tr>
                    <th>#</th><th>Name</th>
                    {tab === 'book' ? <><th>District</th><th>Type</th></> : <><th>Location</th><th>Skill</th></>}
                    <th>Date</th><th>Status</th>
                    {tab === 'book' && <th>Delivery</th>}
                    {tab === 'book' && <th>Notes</th>}
                    <th>Actions</th>
                  </tr></thead>
                  <tbody>
                    {rows.length === 0 && (
                      <tr><td colSpan={9} style={{ textAlign: 'center', padding: '32px', color: 'var(--muted)' }}>No requests found</td></tr>
                    )}
                    {rows.map(r => {
                      const del = getDelivery(r.id);
                      const ds = del?.status || null;
                      const dm = ds ? DELIVERY_META[ds] : null;
                      const noteCount = (del?.notes || []).filter(n => !n.auto).length;
                      return (
                        <tr key={r.id} style={{ cursor: 'pointer', background: selected?.id === r.id ? '#f0fdf4' : undefined }}
                          onClick={() => setSelected(r)}>
                          <td style={{ color: 'var(--muted)', fontSize: 12 }}>#{r.id}</td>
                          <td style={{ fontWeight: 500 }}>{r.name}</td>
                          {tab === 'book'
                            ? <><td style={{ color: 'var(--muted)' }}>{r.district}</td><td style={{ fontSize: 12, color: 'var(--muted)', maxWidth: 130, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.bookType}</td></>
                            : <><td style={{ color: 'var(--muted)' }}>{r.location}</td><td style={{ fontSize: 12, color: 'var(--muted)' }}>{r.skill}</td></>}
                          <td style={{ color: 'var(--muted)', fontSize: 12 }}>{r.date}</td>
                          <td><StatusBadge s={r.status} /></td>
                          {tab === 'book' && (
                            <td>
                              {dm
                                ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '3px 9px', borderRadius: 20, fontSize: 11, fontWeight: 600, background: `${dm.color}18`, color: dm.color }}>{dm.icon} {dm.label}</span>
                                : <span style={{ fontSize: 11, color: 'var(--muted)' }}>—</span>}
                            </td>
                          )}
                          {tab === 'book' && (
                            <td>
                              {noteCount > 0
                                ? <span style={{ fontSize: 12, color: 'var(--g)', fontWeight: 600 }}>💬 {noteCount}</span>
                                : <span style={{ fontSize: 11, color: 'var(--muted)' }}>—</span>}
                            </td>
                          )}
                          <td onClick={e => e.stopPropagation()}>
                            <div style={{ display: 'flex', gap: 4 }}>
                              <button className="btn btn-sm" style={{ background: '#d1fae5', color: '#065f46', border: 'none', padding: '4px 8px', fontSize: 11 }} onClick={() => updateStatus(r.id, 'approved')}>✓</button>
                              <button className="btn btn-sm" style={{ background: '#fee2e2', color: '#991b1b', border: 'none', padding: '4px 8px', fontSize: 11 }} onClick={() => updateStatus(r.id, 'declined')}>✗</button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Detail panel */}
            {selected && (() => {
              const del = getDelivery(selected.id);
              const ds = del?.status;
              const dm = ds ? DELIVERY_META[ds] : null;
              const shopNotes = (del?.notes || []);
              return (
                <div className="card fade-in" style={{ position: 'sticky', top: 0, maxHeight: '82vh', overflow: 'auto' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                    <div style={{ fontWeight: 700, fontSize: 15 }}>{selected.name}</div>
                    <button className="btn-icon" onClick={() => setSelected(null)}>✕</button>
                  </div>

                  <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 16 }}>
                    <StatusBadge s={selected.status} />
                    {dm && <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, padding: '3px 9px', borderRadius: 20, fontSize: 11, fontWeight: 600, background: `${dm.color}18`, color: dm.color }}>{dm.icon} {dm.label}</span>}
                  </div>

                  {/* Delivery address if set */}
                  {del?.address && (
                    <div style={{ background: '#f0fdf4', border: '1px solid #a7f3d0', borderRadius: 6, padding: '10px 14px', marginBottom: 14, fontSize: 12 }}>
                      <div style={{ fontWeight: 600, color: '#065f46', fontSize: 10, textTransform: 'uppercase', letterSpacing: '0.5px', marginBottom: 3 }}>📍 Delivery Address</div>
                      <div style={{ color: '#1a2332' }}>{del.address}</div>
                    </div>
                  )}

                  {/* Request fields */}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 11, marginBottom: 16 }}>
                    {[
                      ['Date', selected.date],
                      ...(selected.type === 'book' ? [
                        ['District', selected.district],
                        ['Phone', selected.phone || '—'],
                        ['Request type', selected.bookType],
                        ['Books wanted', selected.books],
                        ['Reason', selected.reason],
                        ['Heard via', selected.heard],
                      ] : [
                        ['Location', selected.location],
                        ['Skill', selected.skill],
                        ['Message', selected.message],
                      ])
                    ].map(([k, v]) => (
                      <div key={k}>
                        <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: '0.8px', textTransform: 'uppercase', color: 'var(--muted)', marginBottom: 2 }}>{k}</div>
                        <div style={{ fontSize: 13, color: 'var(--text)', lineHeight: 1.5 }}>{v}</div>
                      </div>
                    ))}
                  </div>

                  {/* Shop notes */}
                  {shopNotes.length > 0 && (
                    <div style={{ borderTop: '1px solid var(--border)', paddingTop: 14, marginBottom: 14 }}>
                      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--text)', marginBottom: 10 }}>💬 Shop Staff Notes</div>
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {shopNotes.map((n, i) => (
                          <div key={i} style={{ background: n.auto ? '#f8fafc' : '#f0fdf4', border: `1px solid ${n.auto ? 'var(--border)' : '#a7f3d0'}`, borderLeft: `3px solid ${n.auto ? 'var(--muted)' : 'var(--g)'}`, borderRadius: 6, padding: '9px 12px', fontSize: 12 }}>
                            <div style={{ fontSize: 10, color: 'var(--muted)', marginBottom: 3 }}>{n.author} · {n.date}{n.auto ? ' · auto' : ''}</div>
                            <div style={{ color: 'var(--text)', lineHeight: 1.5 }}>{n.text}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  <div style={{ display: 'flex', gap: 8, borderTop: '1px solid var(--border)', paddingTop: 14 }}>
                    <button className="btn btn-primary btn-sm" style={{ flex: 1, justifyContent: 'center' }} onClick={() => updateStatus(selected.id, 'approved')}>✓ Approve</button>
                    <button className="btn btn-danger btn-sm" style={{ flex: 1, justifyContent: 'center' }} onClick={() => updateStatus(selected.id, 'declined')}>✗ Decline</button>
                  </div>
                  <div style={{ marginTop: 10, textAlign: 'center' }}>
                    <a href="bookshop.html" target="_blank" style={{ fontSize: 11, color: 'var(--muted)' }}>↗ Open Book Shop Portal</a>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>
      );
    }

    // ── Content Editor ────────────────────────────────────────────────────────
    function ContentPage({ content, setContent }) {
      const [saved, setSaved] = useState(false);
      const [local, setLocal] = useState(JSON.parse(JSON.stringify(content)));
      const set = (path, val) => {
        setLocal(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const keys = path.split('.');
          let obj = next;
          keys.slice(0, -1).forEach(k => obj = obj[k]);
          obj[keys[keys.length - 1]] = val;
          return next;
        });
      };
      const save = () => {
        setContent(local);
        ls.set('gk_content', local);
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };
      return (
        <div className="fade-in">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 24 }}>
            <div>
              <div className="page-title">✏️ Site Content</div>
              <div className="page-sub">Edit website text and data — changes reflect live on the main site</div>
            </div>
            <button className="btn btn-primary" onClick={save} style={{ gap: 8 }}>
              {saved ? '✓ Saved!' : '💾 Save Changes'}
            </button>
          </div>
          <div className="grid-2">
            {/* Stats */}
            <div className="card">
              <div className="section-title">📊 Impact Numbers</div>
              <div className="grid-2">
                {[['books', 'Books Donated'], ['districts', 'Districts'], ['families', 'Families Served'], ['libraries', 'Libraries Built']].map(([k, l]) => (
                  <div key={k} className="form-group">
                    <label className="form-label">{l}</label>
                    <input type="number" className="form-input" value={local.stats[k]} onChange={e => set(`stats.${k}`, parseInt(e.target.value) || 0)} />
                  </div>
                ))}
              </div>
            </div>
            {/* Hero */}
            <div className="card">
              <div className="section-title">🏠 Hero Section</div>
              <div className="form-group">
                <label className="form-label">Hero Subtitle</label>
                <input className="form-input" value={local.hero.subtitle} onChange={e => set('hero.subtitle', e.target.value)} />
              </div>
              <div className="section-title" style={{ marginTop: 16 }}>📞 Contact Info</div>
              <div className="form-group">
                <label className="form-label">Facebook Page</label>
                <input className="form-input" value={local.contact.facebook} onChange={e => set('contact.facebook', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Email</label>
                <input className="form-input" value={local.contact.email} onChange={e => set('contact.email', e.target.value)} />
              </div>
            </div>
            {/* Mission */}
            <div className="card" style={{ gridColumn: '1 / -1' }}>
              <div className="section-title">🕌 Mission Section</div>
              <div className="form-group">
                <label className="form-label">Heading</label>
                <input className="form-input" value={local.mission.heading} onChange={e => set('mission.heading', e.target.value)} />
              </div>
              <div className="form-group">
                <label className="form-label">Body Text</label>
                <textarea className="form-input" style={{ minHeight: 110 }} value={local.mission.body} onChange={e => set('mission.body', e.target.value)} />
              </div>
              {saved && (
                <div style={{ background: '#d1fae5', border: '1px solid #a7f3d0', borderRadius: 6, padding: '10px 14px', fontSize: 13, color: '#065f46', marginTop: 4 }}>
                  ✓ Content saved. Reload the main site to see changes.
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Statistics page ───────────────────────────────────────────────────────
    function StatsPage({ requests, content }) {
      const bookReqs = requests.filter(r => r.type === 'book');
      const districtCount = {};
      bookReqs.forEach(r => { districtCount[r.district] = (districtCount[r.district] || 0) + 1; });
      const typeCount = {};
      bookReqs.forEach(r => { typeCount[r.bookType] = (typeCount[r.bookType] || 0) + 1; });
      const heardCount = {};
      bookReqs.forEach(r => { heardCount[r.heard] = (heardCount[r.heard] || 0) + 1; });
      const maxD = Math.max(...Object.values(districtCount));

      return (
        <div className="fade-in">
          <div style={{ marginBottom: 24 }}>
            <div className="page-title">📊 Statistics</div>
            <div className="page-sub">Analytics and distribution data</div>
          </div>
          <div className="grid-3" style={{ marginBottom: 20 }}>
            {[
              { label: 'Approval Rate', val: `${Math.round(requests.filter(r=>r.status==='approved').length/requests.length*100)}%`, icon: '✓', color: '#10b981' },
              { label: 'Avg / Month', val: Math.round(MONTHLY.reduce((a,m)=>a+m.books,0)/MONTHLY.length), icon: '📖', color: 'var(--g)' },
              { label: 'Districts Active', val: Object.keys(districtCount).length, icon: '📍', color: 'var(--gold)' },
            ].map(s => (
              <div key={s.label} className="card card-sm" style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                <div style={{ width: 44, height: 44, borderRadius: 10, background: s.color, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, color: '#fff', flexShrink: 0 }}>{s.icon}</div>
                <div>
                  <div style={{ fontSize: 26, fontWeight: 700, fontFamily: 'Playfair Display, serif', color: 'var(--text)' }}>{s.val}</div>
                  <div style={{ fontSize: 12, color: 'var(--muted)' }}>{s.label}</div>
                </div>
              </div>
            ))}
          </div>
          <div className="grid-2">
            <div className="card">
              <div className="section-title">Requests by District</div>
              {Object.entries(districtCount).sort((a,b)=>b[1]-a[1]).map(([d,c]) => (
                <div key={d} className="bar-row">
                  <div className="bar-label">{d}</div>
                  <div className="bar-track"><div className="bar-fill" style={{ width: `${(c/maxD)*100}%`, background: 'var(--g)' }} /></div>
                  <div className="bar-val">{c}</div>
                </div>
              ))}
            </div>
            <div className="card">
              <div className="section-title">How People Heard About Us</div>
              {Object.entries(heardCount).sort((a,b)=>b[1]-a[1]).map(([h,c]) => (
                <div key={h} className="bar-row">
                  <div className="bar-label" style={{ fontSize: 11 }}>{h}</div>
                  <div className="bar-track"><div className="bar-fill" style={{ width: `${(c/bookReqs.length)*100}%`, background: 'var(--gold)' }} /></div>
                  <div className="bar-val">{c}</div>
                </div>
              ))}
              <div style={{ marginTop: 20 }}>
                <div className="section-title">Request Types</div>
                {Object.entries(typeCount).sort((a,b)=>b[1]-a[1]).map(([t,c]) => (
                  <div key={t} className="bar-row">
                    <div className="bar-label" style={{ fontSize: 10, width: 100 }}>{t.split(' ')[0]}</div>
                    <div className="bar-track"><div className="bar-fill" style={{ width: `${(c/bookReqs.length)*100}%`, background: '#7c3aed' }} /></div>
                    <div className="bar-val">{c}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── Settings page ─────────────────────────────────────────────────────────
    function SettingsPage({ onLogout }) {
      const [pw, setPw] = useState('');
      const [saved, setSaved] = useState(false);
      return (
        <div className="fade-in">
          <div style={{ marginBottom: 24 }}>
            <div className="page-title">⚙️ Settings</div>
            <div className="page-sub">Admin account and system preferences</div>
          </div>
          <div className="grid-2">
            <div className="card">
              <div className="section-title">🔒 Change Password</div>
              <div className="form-group">
                <label className="form-label">New Password</label>
                <input type="password" className="form-input" placeholder="Enter new password" value={pw} onChange={e => setPw(e.target.value)} />
              </div>
              <button className="btn btn-primary btn-sm" onClick={() => { setSaved(true); setPw(''); setTimeout(()=>setSaved(false),2000); }}>
                {saved ? '✓ Saved' : 'Update Password'}
              </button>
            </div>
            <div className="card">
              <div className="section-title">🌐 Site Links</div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <a href="index.html" target="_blank" className="btn btn-ghost" style={{ justifyContent: 'center' }}>↗ Open Main Site</a>
                <button className="btn btn-danger" style={{ justifyContent: 'center' }} onClick={onLogout}>Sign Out</button>
              </div>
            </div>
            <div className="card" style={{ gridColumn: '1/-1' }}>
              <div className="section-title">📊 Data Management</div>
              <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 14, lineHeight: 1.6 }}>
                All data is stored locally in your browser (localStorage). Export to back up or share.
              </div>
              <div style={{ display: 'flex', gap: 10 }}>
                <button className="btn btn-ghost btn-sm" onClick={() => {
                  const data = { requests: ls.get('gk_requests', SEED_REQUESTS), content: ls.get('gk_content', SEED_CONTENT) };
                  const a = document.createElement('a'); a.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(data, null, 2));
                  a.download = 'gyaner-upohar-data.json'; a.click();
                }}>⬇ Export Data (JSON)</button>
                <button className="btn btn-danger btn-sm" onClick={() => { if(confirm('Reset all data to seed defaults?')) { ls.set('gk_requests', SEED_REQUESTS); ls.set('gk_content', SEED_CONTENT); window.location.reload(); } }}>
                  ⚠ Reset to Defaults
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [authed, setAuthed] = useState(() => ls.get('gk_admin_authed', false));
      const [page, setPage] = useState('dashboard');
      const [requests, setRequests] = useState(() => ls.get('gk_requests', SEED_REQUESTS));
      const [content, setContent] = useState(() => ls.get('gk_content', SEED_CONTENT));

      const logout = () => { ls.set('gk_admin_authed', false); setAuthed(false); };
      const login = () => { ls.set('gk_admin_authed', true); setAuthed(true); };

      if (!authed) return <Login onLogin={login} />;

      const pendingReq = requests.filter(r => r.type === 'book' && (r.status === 'pending' || r.status === 'new')).length;
      const pendingVol = requests.filter(r => r.type === 'volunteer' && r.status === 'new').length;

      const pages = {
        dashboard: <Dashboard requests={requests} content={content} setPage={setPage} />,
        requests: <RequestsPage requests={requests} setRequests={setRequests} />,
        volunteers: <RequestsPage requests={requests} setRequests={setRequests} typeFilter="volunteer" />,
        content: <ContentPage content={content} setContent={setContent} />,
        stats: <StatsPage requests={requests} content={content} />,
        settings: <SettingsPage onLogout={logout} />,
      };

      return (
        <div className="layout">
          <Sidebar page={page} setPage={setPage} pendingReq={pendingReq} pendingVol={pendingVol} />
          <div className="main">
            <div className="topbar">
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--text)' }}>
                {NAV.find(n => n.id === page)?.label || 'Dashboard'}
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                {(pendingReq + pendingVol) > 0 && (
                  <div style={{ fontSize: 12, color: 'var(--amber)', fontWeight: 500 }}>
                    ⚠ {pendingReq + pendingVol} items need review
                  </div>
                )}
                <div style={{ width: 30, height: 30, borderRadius: '50%', background: 'var(--g)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, fontWeight: 700 }}>A</div>
              </div>
            </div>
            <div className="content">
              {pages[page] || pages.dashboard}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
