<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>জ্ঞানের উপহার — Gift of Knowledge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Hind+Siliguri:wght@300;400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #1a4d3a;
      --green-mid: #21603f;
      --green-light: #2e7d52;
      --gold: #c9a84c;
      --gold-light: #dbbe72;
      --gold-pale: rgba(201,168,76,0.15);
      --cream: #ffffff;
      --cream-light: #ffffff;
      --brown: #2e1a0a;
      --brown-mid: #4a3520;
      --brown-light: #7a6050;
      --sage: #5a7a5a;
      --teal: #4a9e9e;
      --border: rgba(201,168,76,0.25);
      --shadow: 0 4px 24px rgba(26,77,58,0.08);
    }

    :root { --pattern-display: none; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream-light);
      color: var(--brown);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* Typography */
    h1, h2, h3, h4 { font-family: 'Playfair Display', serif; line-height: 1.2; }
    .bn, .bn * { font-family: 'Hind Siliguri', sans-serif; line-height: 1.8; }
    .ar { font-family: 'Amiri', serif; direction: rtl; unicode-bidi: bidi-override; }
    .serif { font-family: 'Playfair Display', serif; }

    /* Layout */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 32px; }
    .section { padding: 88px 0; }
    .section-sm { padding: 56px 0; }

    /* Gold divider */
    .gold-line { width: 48px; height: 2px; background: var(--gold); }
    .gold-line-c { width: 48px; height: 2px; background: var(--gold); margin: 0 auto; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 30px; border-radius: 3px; font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; text-decoration: none;
      transition: all 0.22s ease; font-family: 'Inter', sans-serif; letter-spacing: 0.3px;
    }
    .btn-gold { background: var(--gold); color: var(--brown); }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
    .btn-outline-w { background: transparent; border: 1.5px solid rgba(255,255,255,0.45); color: #fff; }
    .btn-outline-w:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.7); }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { background: var(--green-mid); transform: translateY(-1px); }
    .btn-outline-g { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
    .btn-outline-g:hover { background: var(--green); color: #fff; }

    /* Cards */
    .card {
      background: #fff; border-radius: 6px; padding: 36px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .card-sm { padding: 24px; }

    /* Grids */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }

    /* Form */
    .form-group { margin-bottom: 22px; }
    .form-label { display: block; margin-bottom: 7px; font-weight: 500; color: var(--brown-mid); font-size: 13px; letter-spacing: 0.4px; text-transform: uppercase; }
    .form-input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid var(--border); border-radius: 4px;
      font-size: 15px; font-family: 'Inter', sans-serif;
      background: var(--cream-light); color: var(--brown);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
    .form-select { -webkit-appearance: none; appearance: none; cursor: pointer; }
    textarea.form-input { resize: vertical; min-height: 110px; }

    /* Page fade */
    .page-enter { animation: pageFade 0.28s ease; }
    @keyframes pageFade { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    /* Stat number */
    .stat-num { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: var(--green); line-height: 1; }
    .stat-label { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--brown-light); margin-top: 6px; }

    /* Arabic calligraphy */
    .bismillah { font-family: 'Amiri', serif; font-size: 32px; color: var(--gold); direction: rtl; text-align: center; }
    .arabic-sm { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); direction: rtl; }

    /* SDG badge */
    .sdg-badge {
      display: inline-block; padding: 4px 12px; border-radius: 2px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
      background: var(--green); color: #fff;
    }

    /* Step indicator */
    .steps { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; flex-shrink: 0;
    }
    .step-active { background: var(--gold); color: var(--brown); }
    .step-done { background: var(--green); color: #fff; }
    .step-inactive { background: var(--border); color: var(--brown-light); border: 1.5px solid var(--border); }
    .step-line { flex: 1; height: 1px; background: var(--border); max-width: 40px; }

    /* Tag pill */
    .tag { display: inline-block; padding: 4px 12px; background: var(--gold-pale); color: var(--brown-mid); border-radius: 2px; font-size: 12px; font-weight: 500; letter-spacing: 0.3px; }

    /* Success state */
    .success-check { width: 72px; height: 72px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }

    /* Blog card image placeholder */
    .img-placeholder {
      width: 100%; aspect-ratio: 16/9; border-radius: 4px;
      background: repeating-linear-gradient(
        45deg, var(--cream), var(--cream) 8px, var(--border) 8px, var(--border) 9px
      );
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-size: 11px; color: var(--brown-light);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      .grid-3, .grid-2, .grid-4 { grid-template-columns: 1fr; }
      .container { padding: 0 20px; }
      .section { padding: 56px 0; }
      .card { padding: 24px; }
      .stat-num { font-size: 40px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
