function AnimCounter({ target, suffix='' }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (!e.isIntersecting) return;
      obs.disconnect();
      let cur = 0; const step = target / 60;
      const tick = () => { cur += step; if (cur >= target) { setVal(target); return; } setVal(Math.floor(cur)); requestAnimationFrame(tick); };
      requestAnimationFrame(tick);
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target]);
  return React.createElement('span', { ref }, val.toLocaleString() + suffix);
}

function PrivacyPage(){const secs=[{n:'1',t:'Who We Are',b:'জ্ঞানের উপহার is a non-commercial volunteer initiative operating from Italy, distributing free books across Bangladesh. Contact: info@gyanerupohar.org'},{n:'2',t:'Data We Collect',b:'When you submit a book request or volunteer application we collect: full name, district, phone (optional), request type, books requested, and how you heard about us. No payment data, no passwords.'},{n:'3',t:'How We Use Your Data',b:'Data is used exclusively to process and deliver your book request, coordinate volunteers, contact you about your request status, and improve our service. We NEVER sell or share your data.'},{n:'4',t:'Legal Basis (GDPR)',b:'Data processing is based on your explicit consent. Under GDPR you have the right to access, rectify, delete, and port your data. Contact: info@gyanerupohar.org'},{n:'5',t:'Data Retention',b:'Request data is retained for up to 24 months after fulfillment. You may request deletion at any time.'},{n:'6',t:'No Cookies, No Trackers',b:'This website does not use advertising cookies or third-party trackers. Session state stored in localStorage stays on your device only.'},{n:'7',t:'Security',b:'Data is accessible only to authorised staff. We apply reasonable technical and organisational measures to protect information.'},{n:'8',t:'Contact',b:'Email: info@gyanerupohar.org — Facebook: জ্ঞানের উপহার — Italy'}];return(<div className="fade"><div className="page-banner"><div className="container"><div className="eyebrow" style={{marginBottom:10}}>Legal</div><h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(26px,5vw,44px)',color:'var(--green)',maxWidth:520}}>Privacy Policy</h1><div className="gline" style={{marginTop:16}}/><p style={{color:'var(--brown-light)',marginTop:12,fontSize:14}}>Last updated: April 2025</p></div></div>
<section className="section"><div className="container" style={{maxWidth:740}}><div style={{background:'rgba(26,77,58,0.04)',border:'1px solid var(--border)',borderLeft:'3px solid var(--gold)',borderRadius:5,padding:'18px 24px',marginBottom:36}}><p style={{fontSize:15,color:'var(--brown)',lineHeight:1.8}}>This initiative is run fillah — for the sake of Allah alone. Data privacy is treated as amanat (a sacred trust).</p></div>
{secs.map(s=>(<div key={s.n} style={{marginBottom:32,paddingBottom:32,borderBottom:'1px solid var(--border)'}}><div style={{display:'flex',gap:14,alignItems:'flex-start'}}><div style={{fontFamily:'Playfair Display,serif',fontSize:26,fontWeight:700,color:'var(--gold)',lineHeight:1,flexShrink:0,width:28}}>{s.n}</div><div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:18,color:'var(--green)',marginBottom:10}}>{s.t}</h3><p style={{fontSize:14,color:'var(--brown-light)',lineHeight:1.85}}>{s.b}</p></div></div></div>))}
<div style={{display:'flex',gap:10,flexWrap:'wrap',justifyContent:'center',marginTop:8}}>{['GDPR Compliant','No Trackers','No Ads','Free Service','آمانة — Amanah'].map(b=>(<span key={b} style={{background:'rgba(26,77,58,0.07)',border:'1px solid var(--border)',color:'var(--green)',padding:'5px 13px',borderRadius:20,fontSize:12,fontWeight:600}}>{b}</span>))}</div>
</div></section></div>);}

function TermsPage(){return(<div className="fade"><div className="page-banner"><div className="container"><div className="eyebrow" style={{marginBottom:10}}>Legal</div><h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(26px,5vw,44px)',color:'var(--green)',maxWidth:520}}>Terms of Use</h1><div className="gline" style={{marginTop:16}}/></div></div>
<section className="section"><div className="container" style={{maxWidth:740}}>{[{t:'1. Nature of Service',b:'জ্ঞানের উপহার is a non-commercial, volunteer-run initiative. All books are gifted freely as sadaqah. We reserve the right to approve or decline any request without explanation.'},{t:'2. Eligibility',b:'The service is open to anyone in Bangladesh and to the Bangladeshi diaspora. Requests must be genuine — misrepresentation will result in disqualification.'},{t:'3. Availability',b:'Book availability is limited and not guaranteed. Approved requests are fulfilled on a best-effort basis.'},{t:'4. Prohibited Use',b:'This platform may not be used for commercial resale of gifted books, for fraudulent applications, or for any purpose contrary to Islamic values or applicable law.'},{t:'5. Governing Law',b:'These terms are governed by Italian law (the initiative is operated from Italy). Disputes are subject to the jurisdiction of the Venice courts.'},{t:'6. Contact',b:'Questions: info@gyanerupohar.org'}].map(s=>(<div key={s.t} style={{marginBottom:28,paddingBottom:28,borderBottom:'1px solid var(--border)'}}><h3 style={{fontFamily:'Playfair Display,serif',fontSize:18,color:'var(--green)',marginBottom:10}}>{s.t}</h3><p style={{fontSize:14,color:'var(--brown-light)',lineHeight:1.85}}>{s.b}</p></div>))}</div></section></div>);}

function ImpressumPage(){return(<div className="fade"><div className="page-banner"><div className="container"><div className="eyebrow" style={{marginBottom:10}}>Legal · EU Compliance</div><h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(26px,5vw,44px)',color:'var(--green)',maxWidth:520}}>Impressum</h1><div className="gline" style={{marginTop:16}}/><p style={{color:'var(--brown-light)',marginTop:12,fontSize:14}}>Required identification per Italian law and EU Directive 2000/31/EC</p></div></div>
<section className="section"><div className="container" style={{maxWidth:640}}><div className="card">{[['Initiative Name','জ্ঞানের উপহার — Gift of Knowledge'],['Nature','Non-commercial voluntary initiative'],['Operator','Farhan Abdullah'],['Address','Marghera, Venezia, Italy'],['Email','info@gyanerupohar.org'],['Facebook','জ্ঞানের উপহার (primary channel)'],['Operating region','Bangladesh (served), Italy (operated from)'],['NGO registration','Planned — currently personal initiative'],['VAT / Tax number','N/A — non-commercial']].map(([k,v])=>(<div key={k} style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,marginBottom:18,paddingBottom:18,borderBottom:'1px solid var(--border)'}}><div style={{fontSize:12,fontWeight:700,color:'var(--brown-mid)'}}>{k}</div><div style={{fontSize:14,color:'var(--brown)',lineHeight:1.6}}>{v}</div></div>))}</div></div></section></div>);}

function VolunteersPage(){const [sent,setSent]=useState(false);const [f,setF]=useState({name:'',location:'',skill:'',message:''});const set=(k,v)=>setF(p=>({...p,[k]:v}));return(<div className="fade"><div className="page-banner"><div className="container"><div className="eyebrow" style={{marginBottom:10}}>Join Us</div><h1 style={{fontFamily:'Playfair Display,serif',fontSize:'clamp(28px,5vw,46px)',color:'var(--green)',maxWidth:520}}>Become a volunteer</h1><div className="gline" style={{marginTop:16}}/></div></div>
<section className="section"><div className="container"><div className="g2" style={{gap:60,alignItems:'start'}}><div><SH label="Roles" heading="How volunteers help"/>{[{n:'01',t:'Ground Distribution',d:'Help identify recipients and coordinate book delivery in your area.'},{n:'02',t:'Social Media & Content',d:'Create content, share our story on Facebook, and grow our reach.'},{n:'03',t:'Translation',d:'Translate content between Bengali, English, and Arabic.'},{n:'04',t:'Document Impact',d:'Photograph handoffs (with consent) and collect beneficiary stories.'}].map(r=>(<div key={r.n} style={{display:'flex',gap:16,alignItems:'flex-start',marginBottom:22}}><div style={{fontSize:26,fontFamily:'Playfair Display,serif',color:'var(--gold)',fontWeight:700,flexShrink:0,lineHeight:1,minWidth:32}}>{r.n}</div><div><div style={{fontWeight:700,color:'var(--brown)',marginBottom:4,fontSize:14}}>{r.t}</div><p style={{fontSize:14,color:'var(--brown-light)',lineHeight:1.6}}>{r.d}</p></div></div>))}</div>
<div><SH label="Apply" heading="Volunteer application"/>{sent?(<div className="card" style={{textAlign:'center'}}><div style={{fontSize:40,marginBottom:16}}>🤲</div><h3 style={{fontFamily:'Playfair Display,serif',fontSize:22,marginBottom:10}}>Jazakallahu Khairan!</h3><p style={{color:'var(--brown-light)'}}>We'll be in touch soon, in sha Allah.</p></div>):(<div className="card"><div className="form-group"><label className="form-label">Your Name</label><input className="form-input" value={f.name} onChange={e=>set('name',e.target.value)} placeholder="Full name"/></div><div className="form-group"><label className="form-label">Your Location</label><input className="form-input" value={f.location} onChange={e=>set('location',e.target.value)} placeholder="City, Country"/></div><div className="form-group"><label className="form-label">How you can help</label><select className="form-input" value={f.skill} onChange={e=>set('skill',e.target.value)}><option value="">Select...</option>{['Ground distribution (Bangladesh)','Social media & content','Translation','Fundraising','Other'].map(o=><option key={o}>{o}</option>)}</select></div><div className="form-group"><label className="form-label">Message</label><textarea className="form-input" value={f.message} onChange={e=>set('message',e.target.value)} placeholder="Tell us about yourself..."/></div><button className="btn btn-gold" style={{width:'100%',justifyContent:'center'}} onClick={()=>{const prev=ls.get('gk_requests',[]);ls.set('gk_requests',[...prev,{id:Date.now(),type:'volunteer',name:f.name,location:f.location,skill:f.skill,message:f.message,date:new Date().toISOString().slice(0,10),status:'new'}]);setSent(true);}}>Submit Application</button></div>)}</div>
</div></div></section></div>);}

function App() {
  const [lang, setLang] = useState(ls.get('gk_lang','en'));
  const [page, setPage] = useState('home');
  const toggle = () => { const n=lang==='en'?'bn':'en'; setLang(n); ls.set('gk_lang',n); };
  useEffect(() => { window.scrollTo(0,0); }, [page]);
  const goPage = (p) => setPage(p);
  const pages = {
    home:<HomePage setPage={goPage}/>, about:<AboutPage/>, books:<BooksPage setPage={goPage}/>,
    apply:<ApplyPage/>, impact:<ImpactPage/>, stories:<StoriesPage/>, blog:<BlogPage/>,
    contact:<ContactPage/>, sdg:<SDGPage/>, privacy:<PrivacyPage/>, terms:<TermsPage/>,
    impressum:<ImpressumPage/>, volunteers:<VolunteersPage/>,
  };
  return (
    <LangCtx.Provider value={{ lang, toggle }}>
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
        <Header page={page} setPage={goPage}/>
        <main style={{flex:1}}>{pages[page]||pages.home}</main>
        <Footer setPage={goPage}/>
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
